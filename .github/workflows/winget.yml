name: Publish to winget

# Auto-submits a manifest update PR to microsoft/winget-pkgs whenever a GitHub
# Release is published. The very first submission (creating AsimAftab.Odin in
# winget-pkgs) must be done manually with `wingetcreate new` against the v0.1.1
# release URL — the action only handles updates to existing packages.
#
# Required setup (one-time):
#   1. Fork https://github.com/microsoft/winget-pkgs to your GitHub account
#   2. Create a classic PAT with `public_repo` scope (or fine-grained PAT with
#      contents:write on the winget-pkgs fork)
#   3. Add it as a repository secret named WINGET_TOKEN

on:
  # Fire after the Release workflow finishes successfully.
  # The previous trigger (`release: types: [released]`) never fires when the
  # release is created by GITHUB_TOKEN from inside another workflow — GitHub
  # blocks the cascade to prevent recursive runs.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.2.1). Leave blank to use the latest release."
        required: false
        default: ""

jobs:
  publish:
    name: Publish manifest update
    runs-on: windows-latest
    # Skip if upstream Release run failed or was cancelled.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Resolve release tag
        id: resolve
        shell: pwsh
        run: |
          $tag = ''
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $tag = '${{ inputs.tag }}'
          } elseif ($env:GITHUB_EVENT_NAME -eq 'workflow_run') {
            $tag = '${{ github.event.workflow_run.head_branch }}'
          }
          if (-not $tag) {
            $resp = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/latest" `
              -Headers @{ Authorization = "token $env:GITHUB_TOKEN" }
            $tag = $resp.tag_name
          }
          Write-Output "Resolved tag: $tag"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Submit to winget-pkgs
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: AsimAftab.Odin
          installers-regex: '^odin\.exe$'
          release-tag: ${{ steps.resolve.outputs.tag }}
          token: ${{ secrets.WINGET_TOKEN }}
