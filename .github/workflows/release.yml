name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows executable
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/odin.exe dist/odin.exe
          Copy-Item scripts/install.ps1 dist/install.ps1
          Copy-Item scripts/uninstall.ps1 dist/uninstall.ps1
          Copy-Item scripts/bootstrap.ps1 dist/bootstrap.ps1
          Compress-Archive -Path dist/odin.exe -DestinationPath dist/odin-windows-x64.zip -Force
          @(
            "odin.exe",
            "odin-windows-x64.zip",
            "install.ps1",
            "uninstall.ps1",
            "bootstrap.ps1"
          ) | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 (Join-Path dist $_)).Hash.ToLowerInvariant()
            "$hash  $_"
          } | Set-Content -Encoding UTF8 dist/checksums.txt
          $repo = $env:GITHUB_REPOSITORY
          @(
            "# Odin $env:GITHUB_REF_NAME",
            "",
            "## Installation",
            "",
            "### winget (recommended)",
            "",
            "    winget install AsimAftab.Odin",
            "",
            "### PowerShell (CI/automation)",
            "",
            "    irm https://github.com/$repo/releases/latest/download/bootstrap.ps1 | iex",
            "",
            "Or download install.ps1 from this release and run:",
            "",
            "    .\install.ps1 -Repository $repo -Scope User",
            "",
            "## Included artifacts",
            "",
            "- odin.exe",
            "- odin-windows-x64.zip",
            "- install.ps1",
            "- uninstall.ps1",
            "- bootstrap.ps1",
            "- checksums.txt",
            "",
            "## Checksums",
            "",
            "See checksums.txt in this release."
          ) | Set-Content -Encoding UTF8 dist/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/odin.exe
            dist/odin-windows-x64.zip
            dist/install.ps1
            dist/uninstall.ps1
            dist/bootstrap.ps1
            dist/checksums.txt
          body_path: dist/release-notes.md

  # Keeps scoop/odin.json on main pointing at the release that was just
  # published (winget has its own workflow; scoop installs straight from the
  # raw manifest URL).
  update-scoop-manifest:
    name: Update scoop manifest
    needs: release-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Bump manifest to released version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          curl -sSL "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/checksums.txt" -o /tmp/checksums.txt
          HASH=$(tr -d '\r' < /tmp/checksums.txt | awk '/odin-windows-x64\.zip/ {print $1}')
          test -n "$HASH"
          jq --arg v "$VERSION" --arg h "$HASH" \
             --arg u "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/odin-windows-x64.zip" \
             '.version = $v | .hash = $h | .url = $u' \
             scoop/odin.json > /tmp/odin.json && mv /tmp/odin.json scoop/odin.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scoop/odin.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: scoop manifest ${VERSION}"
          git push

  # Publishes odin-cli to crates.io. Runs on Windows because `cargo publish`
  # verifies by building, and the crate only compiles on Windows targets.
  publish-crate:
    name: Publish to crates.io
    needs: release-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          grep -q "^version = \"$VERSION\"$" Cargo.toml || {
            echo "Cargo.toml version does not match tag $GITHUB_REF_NAME"; exit 1; }

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
