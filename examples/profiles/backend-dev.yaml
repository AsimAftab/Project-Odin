# A realm for backend Rust + Postgres work.
# Bind it with: odin activate backend-dev
name: backend-dev
description: Backend Rust + Postgres workflow

# Runes — environment variables exported into spawned warriors.
env:
  RUST_LOG: debug
  DATABASE_URL: postgres://localhost/dev

# Warriors — apps that ride out when the realm is bound.
startup_apps:
  - name: editor
    command: code
    args:
      - .
    cwd: C:\repos\backend
    window: maximized
  - name: terminal
    command: wt.exe
    args:
      - new-tab
      - -p
      - PowerShell
      - --title
      - backend
    window: normal
  - name: db-console
    command: psql
    args:
      - -h
      - localhost
      - -d
      - dev
    window: normal

# Forge — VS Code workspace opened on activation.
vscode_workspace: C:\repos\backend\backend.code-workspace

# Ravens — URLs sent flying on activation.
browser_urls:
  - name: backend-prs
    url: https://github.com/myorg/backend/pulls
  - name: local
    url: http://localhost:3000

