# A realm for distraction-free reading and notes.
# Bind it with: odin activate study-mode
name: study-mode
description: Distraction-free reading + notes

# Warriors — what rides out when the realm is bound.
startup_apps:
  - name: notes
    command: notepad
    window: maximized
  - name: docs
    command: https://doc.rust-lang.org/book/
    window: normal

# Ravens — URLs sent flying on activation.
browser_urls:
  - name: hn
    url: https://news.ycombinator.com
  - name: notifications
    url: https://github.com/notifications

